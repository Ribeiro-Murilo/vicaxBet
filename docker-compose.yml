services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: vi-server
    # Le DB_HOST/DB_USER/DB_PASSWORD/DB_NAME/JWT_SECRET/PORT do .env (MySQL externo)
    env_file: .env
    ports:
      - "3001:3001"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        # Endereco do back que o navegador vai chamar (vem do .env)
        VITE_API_URL: ${VITE_API_URL}
    container_name: vi-web
    depends_on:
      - server
    ports:
      - "8080:80"
    restart: unless-stopped
